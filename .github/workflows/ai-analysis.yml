name: AI Pipeline Failure Analysis

on:
  workflow_run:
    workflows: ["Vehicle Evaluation CI/CD"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  analyze-failure:
    name: Analyze Failure with Claude
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Collect failed job logs
        id: collect-logs
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;

            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId
            });

            const failedJobs = jobs.filter(j => j.conclusion === 'failure');
            let logContent = '';

            for (const job of failedJobs.slice(0, 3)) {
              try {
                const { data: logs } = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id
                });
                const text = typeof logs === 'string' ? logs : Buffer.from(logs).toString('utf-8');
                // Keep last 6000 chars to focus on the failure
                logContent += `\n### Job: ${job.name}\n\`\`\`\n${text.slice(-6000)}\n\`\`\`\n`;
              } catch (err) {
                logContent += `\n### Job: ${job.name}\n(Logs unavailable: ${err.message})\n`;
              }
            }

            const fs = require('fs');
            fs.writeFileSync('/tmp/failure-logs.txt', logContent.slice(0, 20000));

            core.setOutput('sha', context.payload.workflow_run.head_sha);
            core.setOutput('run_url', context.payload.workflow_run.html_url);
            core.setOutput('run_id', String(runId));
            core.setOutput('branch', context.payload.workflow_run.head_branch);

      - name: Analyze failure with Gemini AI
        id: ai-analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node .github/scripts/analyze-failure.js

      - name: Post analysis as PR comment
        if: steps.ai-analysis.outputs.has_analysis == 'true'
        uses: actions/github-script@v7
        env:
          AI_ANALYSIS: ${{ steps.ai-analysis.outputs.analysis }}
        with:
          script: |
            const sha = '${{ steps.collect-logs.outputs.sha }}';
            const runUrl = '${{ steps.collect-logs.outputs.run_url }}';
            const runId = '${{ steps.collect-logs.outputs.run_id }}';
            const analysis = process.env.AI_ANALYSIS;

            const body = [
              `## CI Failure Analysis`,
              ``,
              `**Failed run:** [#${runId}](${runUrl}) on \`${{ steps.collect-logs.outputs.branch }}\``,
              ``,
              analysis,
              ``,
              `---`,
              `*Analysis generated by [Gemini AI](https://ai.google.dev)*`
            ].join('\n');

            // Post on associated PR if one exists
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha
            });

            if (prs.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs[0].number,
                body
              });
              core.info(`Posted analysis on PR #${prs[0].number}`);
            } else {
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha,
                body
              });
              core.info(`Posted analysis on commit ${sha}`);
            }
